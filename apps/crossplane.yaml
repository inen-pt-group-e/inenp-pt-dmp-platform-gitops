apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  sources:
    - repoURL: https://charts.crossplane.io/stable
      chart: crossplane
      targetRevision: 2.3.1
      helm:
        releaseName: crossplane
        valueFiles:
          - $values/components/crossplane/values.yaml
    - repoURL: https://github.com/inen-pt-group-e/inenp-pt-dmp-platform-gitops
      targetRevision: main
      ref: values
    - repoURL: https://github.com/inen-pt-group-e/inenp-pt-dmp-platform-gitops
      targetRevision: main
      path: components/crossplane/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
