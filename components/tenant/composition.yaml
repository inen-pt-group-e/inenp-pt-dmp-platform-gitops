apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tenant
spec:
  compositeTypeRef:
    apiVersion: platform.mcce-project.xyz/v1alpha1
    kind: Tenant
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $tenant := .observed.composite.resource.metadata.name }}
            {{- $ns := printf "tenant-%s" $tenant }}
            {{- $db := .observed.composite.resource.spec.database | default dict }}
            {{- $res := .observed.composite.resource.spec.resources | default dict }}
            {{- $app := .observed.composite.resource.spec.app | default dict }}
            {{- $backendTag := $app.backendTag | default "v1.4.0" }}
            {{- $frontendTag := $app.frontendTag | default "v1.3.0" }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-namespace
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $ns }}
                    labels:
                      platform.mcce-project.xyz/tenant: {{ $tenant }}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-resource-quota
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: resource-quota
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ResourceQuota
                  metadata:
                    name: tenant-quota
                    namespace: {{ $ns }}
                  spec:
                    hard:
                      requests.cpu: {{ $res.requestsCpu | default "1" | quote }}
                      requests.memory: {{ $res.requestsMemory | default "2Gi" | quote }}
                      limits.cpu: {{ $res.limitsCpu | default "4" | quote }}
                      limits.memory: {{ $res.limitsMemory | default "4Gi" | quote }}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-limit-range
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: limit-range
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: LimitRange
                  metadata:
                    name: tenant-defaults
                    namespace: {{ $ns }}
                  spec:
                    limits:
                      - type: Container
                        defaultRequest:
                          cpu: "50m"
                          memory: "128Mi"
                        default:
                          cpu: "500m"
                          memory: "512Mi"
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-network-policy-default-deny-ingress
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: network-policy-default-deny-ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata:
                    name: default-deny-ingress
                    namespace: {{ $ns }}
                  spec:
                    podSelector: {}
                    policyTypes:
                      - Ingress
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-network-policy-same-namespace
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: network-policy-same-namespace
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata:
                    name: allow-same-namespace
                    namespace: {{ $ns }}
                  spec:
                    podSelector: {}
                    policyTypes:
                      - Ingress
                    ingress:
                      - from:
                          - podSelector: {}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-network-policy-ingress-frontend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: network-policy-ingress-frontend
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata:
                    name: allow-ingress-nginx-to-frontend
                    namespace: {{ $ns }}
                  spec:
                    podSelector:
                      matchLabels:
                        app: frontend
                    policyTypes:
                      - Ingress
                    ingress:
                      - from:
                          - namespaceSelector:
                              matchLabels:
                                kubernetes.io/metadata.name: ingress-nginx
                        ports:
                          - protocol: TCP
                            port: 8080
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-network-policy-ingress-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: network-policy-ingress-backend
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata:
                    name: allow-ingress-nginx-to-backend
                    namespace: {{ $ns }}
                  spec:
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: weather-app-backend
                    policyTypes:
                      - Ingress
                    ingress:
                      - from:
                          - namespaceSelector:
                              matchLabels:
                                kubernetes.io/metadata.name: ingress-nginx
                        ports:
                          - protocol: TCP
                            port: 8080
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-network-policy-cnpg-operator
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: network-policy-cnpg-operator
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata:
                    name: allow-cnpg-operator
                    namespace: {{ $ns }}
                  spec:
                    podSelector:
                      matchLabels:
                        cnpg.io/cluster: {{ $tenant }}-db
                    policyTypes:
                      - Ingress
                    ingress:
                      - from:
                          - namespaceSelector:
                              matchLabels:
                                kubernetes.io/metadata.name: cnpg-system
                        ports:
                          - protocol: TCP
                            port: 8000
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-db
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: database
            spec:
              forProvider:
                manifest:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $tenant }}-db
                    namespace: {{ $ns }}
                  spec:
                    imageName: ghcr.io/cloudnative-pg/postgresql:16.3-bookworm
                    instances: {{ $db.instances | default 1 }}
                    storage:
                      size: {{ $db.storageSize | default "1Gi" | quote }}
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "256Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
              providerConfigRef:
                name: default
            ---
            apiVersion: helm.crossplane.io/v1beta1
            kind: Release
            metadata:
              name: {{ $tenant }}-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: backend
            spec:
              forProvider:
                namespace: {{ $ns }}
                chart:
                  repository: oci://ghcr.io/inen-pt-group-e/charts
                  name: weather-app-backend
                  version: "1.0.0"
                values:
                  fullnameOverride: {{ $tenant }}-backend
                  image:
                    repository: ghcr.io/inen-pt-group-e/inenp-pt-dmp-backend
                    tag: {{ $backendTag }}
                  service:
                    type: ClusterIP
                    port: 8080
                  resources:
                    requests:
                      cpu: "250m"
                      memory: "512Mi"
                    limits:
                      cpu: "1"
                      memory: "1Gi"
                  livenessProbe:
                    httpGet:
                      path: /actuator/health
                      port: http
                    initialDelaySeconds: 90
                    periodSeconds: 10
                    timeoutSeconds: 3
                    failureThreshold: 6
                  readinessProbe:
                    httpGet:
                      path: /actuator/health
                      port: http
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 3
                    failureThreshold: 12
                  extraEnv:
                    - name: SPRING_FLYWAY_ENABLED
                      value: "false"
                    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                      value: "update"
                    - name: SPRING_DATASOURCE_URL
                      value: "jdbc:postgresql://{{ $tenant }}-db-rw.{{ $ns }}:5432/app"
                    - name: SPRING_DATASOURCE_USERNAME
                      valueFrom:
                        secretKeyRef:
                          name: {{ $tenant }}-db-app
                          key: username
                    - name: SPRING_DATASOURCE_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: {{ $tenant }}-db-app
                          key: password
                  podSecurityContext:
                    runAsNonRoot: true
                    runAsUser: 1000
                    runAsGroup: 1000
                    fsGroup: 1000
                    seccompProfile:
                      type: RuntimeDefault
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop:
                        - ALL
                  volumes:
                    - name: tmp
                      emptyDir: {}
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-ghcr-pull-secret
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ghcr-pull-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: external-secrets.io/v1
                  kind: ExternalSecret
                  metadata:
                    name: ghcr-pull-secret
                    namespace: {{ $ns }}
                  spec:
                    refreshInterval: 1h
                    secretStoreRef:
                      name: gcp-secret-manager
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      template:
                        type: kubernetes.io/dockerconfigjson
                    data:
                      - secretKey: .dockerconfigjson
                        remoteRef:
                          key: ghcr-pull-token
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend-config
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-config
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: frontend-config
                    namespace: {{ $ns }}
                  data:
                    config.js: |
                      window.APP_CONFIG = { enabled: true, VITE_BACKEND_API_URL: '/api' };
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: frontend
                    namespace: {{ $ns }}
                  spec:
                    replicas: 1
                    selector:
                      matchLabels:
                        app: frontend
                    template:
                      metadata:
                        labels:
                          app: frontend
                      spec:
                        imagePullSecrets:
                          - name: ghcr-pull-secret
                        containers:
                          - name: frontend
                            image: ghcr.io/inen-pt-group-e/inenp-pt-dmp-frontend:{{ $frontendTag }}
                            ports:
                              - containerPort: 8080
                            securityContext:
                              runAsNonRoot: true
                              runAsUser: 101
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities:
                                drop:
                                  - ALL
                              seccompProfile:
                                type: RuntimeDefault
                            resources:
                              requests:
                                cpu: "25m"
                                memory: "64Mi"
                              limits:
                                cpu: "250m"
                                memory: "128Mi"
                            volumeMounts:
                              - name: config-js
                                mountPath: /usr/share/nginx/html/config.js
                                subPath: config.js
                              - name: tmp
                                mountPath: /tmp
                        volumes:
                          - name: config-js
                            configMap:
                              name: frontend-config
                          - name: tmp
                            emptyDir: {}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend-svc
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-svc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: frontend
                    namespace: {{ $ns }}
                  spec:
                    selector:
                      app: frontend
                    ports:
                      - port: 80
                        targetPort: 8080
                    type: ClusterIP
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-ingress
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $tenant }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: letsencrypt-prod
                  spec:
                    ingressClassName: nginx
                    tls:
                      - hosts:
                          - {{ $tenant }}.mcce-project.xyz
                        secretName: {{ $tenant }}-tls
                    rules:
                      - host: {{ $tenant }}.mcce-project.xyz
                        http:
                          paths:
                            - path: /api
                              pathType: Prefix
                              backend:
                                service:
                                  name: {{ $tenant }}-backend
                                  port:
                                    number: 8080
                            - path: /
                              pathType: Prefix
                              backend:
                                service:
                                  name: frontend
                                  port:
                                    number: 80
              providerConfigRef:
                name: default
    - step: ready
      functionRef:
        name: function-auto-ready
