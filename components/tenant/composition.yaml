apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tenant
spec:
  compositeTypeRef:
    apiVersion: platform.mcce-project.xyz/v1alpha1
    kind: Tenant
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $tenant := .observed.composite.resource.metadata.name }}
            {{- $ns := printf "tenant-%s" $tenant }}
            {{- $db := .observed.composite.resource.spec.database | default dict }}
            {{- $res := .observed.composite.resource.spec.resources | default dict }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-namespace
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $ns }}
                    labels:
                      platform.mcce-project.xyz/tenant: {{ $tenant }}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-resource-quota
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: resource-quota
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ResourceQuota
                  metadata:
                    name: tenant-quota
                    namespace: {{ $ns }}
                  spec:
                    hard:
                      requests.cpu: {{ $res.requestsCpu | default "500m" | quote }}
                      requests.memory: {{ $res.requestsMemory | default "512Mi" | quote }}
                      limits.cpu: {{ $res.limitsCpu | default "2" | quote }}
                      limits.memory: {{ $res.limitsMemory | default "2Gi" | quote }}
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-db
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: database
            spec:
              forProvider:
                manifest:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $tenant }}-db
                    namespace: {{ $ns }}
                  spec:
                    imageName: ghcr.io/cloudnative-pg/postgresql:16.3-bookworm
                    instances: {{ $db.instances | default 1 }}
                    storage:
                      size: {{ $db.storageSize | default "1Gi" | quote }}
              providerConfigRef:
                name: default
            ---
            apiVersion: helm.crossplane.io/v1beta1
            kind: Release
            metadata:
              name: {{ $tenant }}-backend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: backend
            spec:
              forProvider:
                namespace: {{ $ns }}
                chart:
                  repository: oci://ghcr.io/inen-pt-group-e/charts
                  name: weather-app-backend
                  version: "1.0.0"
                values:
                  image:
                    repository: ghcr.io/inen-pt-group-e/inenp-pt-dmp-backend
                    tag: v1.4.0
                  service:
                    type: ClusterIP
                    port: 8080
                  extraEnv:
                    - name: SPRING_FLYWAY_ENABLED
                      value: "false"
                    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                      value: "update"
                    - name: SPRING_DATASOURCE_URL
                      value: "jdbc:postgresql://{{ $tenant }}-db-rw.{{ $ns }}:5432/app"
                    - name: SPRING_DATASOURCE_USERNAME
                      valueFrom:
                        secretKeyRef:
                          name: {{ $tenant }}-db-app
                          key: username
                    - name: SPRING_DATASOURCE_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: {{ $tenant }}-db-app
                          key: password
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-ghcr-pull-secret
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ghcr-pull-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: external-secrets.io/v1
                  kind: ExternalSecret
                  metadata:
                    name: ghcr-pull-secret
                    namespace: {{ $ns }}
                  spec:
                    refreshInterval: 1h
                    secretStoreRef:
                      name: gcp-secret-manager
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      template:
                        type: kubernetes.io/dockerconfigjson
                    data:
                      - secretKey: .dockerconfigjson
                        remoteRef:
                          key: ghcr-pull-token
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend-config
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-config
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: frontend-config
                    namespace: {{ $ns }}
                  data:
                    config.js: |
                      window.APP_CONFIG = { enabled: true, VITE_BACKEND_API_URL: '/api' };
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: frontend
                    namespace: {{ $ns }}
                  spec:
                    replicas: 1
                    selector:
                      matchLabels:
                        app: frontend
                    template:
                      metadata:
                        labels:
                          app: frontend
                      spec:
                        imagePullSecrets:
                          - name: ghcr-pull-secret
                        containers:
                          - name: frontend
                            image: ghcr.io/inen-pt-group-e/inenp-pt-dmp-frontend:v1.1.3
                            ports:
                              - containerPort: 80
                            volumeMounts:
                              - name: config-js
                                mountPath: /usr/share/nginx/html/config.js
                                subPath: config.js
                        volumes:
                          - name: config-js
                            configMap:
                              name: frontend-config
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-frontend-svc
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-svc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: frontend
                    namespace: {{ $ns }}
                  spec:
                    selector:
                      app: frontend
                    ports:
                      - port: 80
                        targetPort: 80
                    type: ClusterIP
              providerConfigRef:
                name: default
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: {{ $tenant }}-ingress
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $tenant }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: letsencrypt-prod
                  spec:
                    ingressClassName: nginx
                    tls:
                      - hosts:
                          - {{ $tenant }}.mcce-project.xyz
                        secretName: {{ $tenant }}-tls
                    rules:
                      - host: {{ $tenant }}.mcce-project.xyz
                        http:
                          paths:
                            - path: /api
                              pathType: Prefix
                              backend:
                                service:
                                  name: {{ $tenant }}-backend
                                  port:
                                    number: 8080
                            - path: /
                              pathType: Prefix
                              backend:
                                service:
                                  name: frontend
                                  port:
                                    number: 80
              providerConfigRef:
                name: default
    - step: ready
      functionRef:
        name: function-auto-ready
